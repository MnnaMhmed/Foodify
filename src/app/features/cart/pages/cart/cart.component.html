<section class="container mx-auto px-6 py-32">

  <h1 class="text-5xl font-black mb-10">
    Your Cart
  </h1>

  <!-- EMPTY CART -->
  <div
    *ngIf="cartItems.length === 0"
    class="bg-white rounded-3xl p-10 text-center shadow-lg"
  >

    <h2 class="text-3xl font-black text-gray-700">
      Your cart is empty
    </h2>

    <p class="text-gray-500 mt-4">
      Add some delicious meals 🍔
    </p>

  </div>

  <!-- CART ITEMS -->
  <div
    *ngFor="let item of cartItems; let i = index"
    class="bg-white p-6 rounded-3xl shadow-lg mb-5 flex items-center justify-between"
  >

    <div class="flex items-center gap-5">

      <img
        [src]="item.imageUrl"
        [alt]="item.nameEn"
        class="w-28 h-28 rounded-2xl object-cover"
      />

      <div>

        <h2 class="text-2xl font-black">
          {{item.nameEn}}
        </h2>

        <p class="text-orange-500 mt-2 text-lg font-bold">
          ${{item.price}}
        </p>

      </div>

    </div>

    <button
      (click)="remove(i)"
      class="bg-red-500 hover:bg-red-600 transition text-white px-5 py-3 rounded-xl"
    >
      Remove
    </button>

  </div>

  <!-- TOTAL -->
  <div
    *ngIf="cartItems.length > 0"
    class="bg-orange-100 rounded-3xl p-8 mt-10 flex items-center justify-between"
  >

    <h2 class="text-3xl font-black">
      Total
    </h2>

    <span class="text-4xl font-black text-orange-500">
      ${{getTotal()}}
    </span>

  </div>

  <!-- CHECKOUT BUTTON -->
  <div
    *ngIf="cartItems.length > 0"
    class="mt-10 text-right"
  >

    <button
      (click)="checkout()"
      class="bg-orange-500 hover:bg-orange-600 transition text-white px-10 py-4 rounded-2xl text-xl font-bold shadow-lg"
    >
      Proceed To Checkout (ADD Products To Orders Page)
    </button>

  </div>

</section>
