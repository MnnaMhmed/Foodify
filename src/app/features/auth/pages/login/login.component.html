<input
  type="email"
  [(ngModel)]="email"
  placeholder="Email"
  class="w-full p-4 border rounded-2xl"
/>

<input
  type="password"
  [(ngModel)]="password"
  placeholder="Password"
  class="w-full p-4 border rounded-2xl"
/>

<button
  (click)="login()"
  class="w-full bg-orange-500 text-white p-4 rounded-2xl"
>
  Login
</button>
