<section class="min-h-screen bg-orange-50 py-32">

  <div class="container mx-auto px-6">

    <div class="text-center mb-20">

      <h1 class="text-6xl font-black">
        Our Menu
      </h1>

      <p class="text-gray-500 mt-5">
        Discover our delicious meals
      </p>

    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">

      <div
        *ngFor="let product of products"
        class="bg-white rounded-[35px] overflow-hidden shadow-xl hover:scale-105 transition duration-500"
      >

        <img
          [src]="product.imageUrl"
          class="w-full h-72 object-cover"
        />

        <div class="p-6">

          <h2 class="text-2xl font-black">
            {{product.nameEn}}
          </h2>

          <div class="flex justify-between items-center mt-6">

            <span class="text-3xl font-black text-orange-500">
              ${{product.price}}
            </span>

            <button
              (click)="addToCart(product)"
              class="bg-orange-500 text-white px-5 py-3 rounded-2xl"
            >
              Add
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
